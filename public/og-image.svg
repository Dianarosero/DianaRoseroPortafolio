  <text x="140" y="305" fill="#f5f5ff" font-family="Outfit, Segoe UI, Arial, sans-serif" font-size="72" font-weight="800">Diana Rosero</text>
  <text x="140" y="370" fill="#d8d8f0" font-family="Outfit, Segoe UI, Arial, sans-serif" font-size="34" font-weight="500">Ingeniera de Sistemas y Frontend Developer</text>

  <rect x="140" y="430" width="460" height="56" rx="14" fill="url(#accent)" opacity="0.95" />
  <text x="168" y="467" fill="#0f0f1a" font-family="Outfit, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">React · TypeScript · Tailwind</text>
